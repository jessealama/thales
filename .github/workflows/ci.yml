name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: '24.x'
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC

jobs:
  build-and-test:
    name: Build + Lean tests + conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetches typescript-tests/ — its .gitmodules entry sets shallow=true,
          # so this stays cheap despite the upstream repo being huge.
          submodules: recursive

      - name: Install Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          # We run our own lake commands below; tell the action not to build/test/lint.
          auto-config: false
          build: false
          test: false
          lint: false
          # We manage .lake/build + .lake/packages caching manually below.
          use-github-cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: npm install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .lake/build
            .lake/packages
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Build thales
        run: lake build

      - name: Lean tests
        run: lake build ThalesTest

      - name: Harness self-test
        run: node scripts/run-examples.js --self-test

      - name: Conformance corpus
        run: node scripts/run-examples.js

      - name: TS conformance (sample)
        # Strided deterministic sample over microsoft/TypeScript's conformance
        # corpus; thresholds chosen with ~7 pts of headroom below the current
        # measured agreement. Bump these as thales improves.
        run: node scripts/run-ts-conformance.js --sample 200 --min-agreement 75 --max-parse-errors 0
