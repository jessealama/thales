name: TS conformance

# Run over the full microsoft/TypeScript conformance corpus.

on:
  schedule:
    # 03:00 UTC on the 1st of every month.
    - cron: '0 3 1 * *'
  workflow_dispatch:

env:
  NODE_VERSION: '24.x'
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC

jobs:
  full-conformance:
    name: Full TS conformance corpus
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: npm install
        run: npm ci

      - name: Cache Lake build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .lake/build
            .lake/packages
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Build thales
        run: lake build

      - name: Full conformance run
        run: |
          set -o pipefail
          node scripts/run-ts-conformance.js | tee conformance-report.txt

      - name: Post report to job summary
        if: always()
        run: |
          {
            echo "## TypeScript conformance — full corpus"
            echo
            echo '```'
            cat conformance-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report-${{ github.run_id }}
          path: conformance-report.txt

      - name: test262 run
        run: |
          set -o pipefail
          node scripts/run-test262.js | tee test262-report.txt

      - name: Post test262 report to job summary
        run: |
          {
            echo "## test262 — sliced corpus"
            echo
            echo '```'
            cat test262-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test262 report
        uses: actions/upload-artifact@v4
        with:
          name: test262-report-${{ github.run_id }}
          path: test262-report.txt
